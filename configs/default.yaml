defaults:
  - model: pythia_1b
  - _self_

dataset: "monology/pile-uncopyrighted"
dataset_config: null
text_column: "text"
dataset_split: "train"
total_tokens: 1_000_000_000

# Hardware constraints.
batch_size: 4096
seq_len: 128

# UX preferences.
log_interval: 100
checkpoint_interval: 5000
kl_batch_size: ${batch_size}

seed: 42
output_dir: "runs/default"
resume_from_checkpoint: ""
checkpoint_path: ""

# Optional overrides (0 / null = use derived values).
F: 0
L0_target: 0
V_cap: 0
